# Azure App Service Backend Deployment Workflow
name: Deploy Backend to Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "fonts/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/deploy-backend-azure-app-service.yml"

env:
  PYTHON_VERSION: "3.12"
  BACKEND_APP_NAME: ${{ vars.AZURE_BACKEND_APP_NAME }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Prepare artifact
        run: |
          mkdir -p deploy
          cp -R app deploy/app
          cp -R fonts deploy/fonts 2>/dev/null || true
          cp requirements.txt deploy/requirements.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://${{ env.BACKEND_APP_NAME }}.azurewebsites.net

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: backend-app

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend-app
